# CRM Automation Framework Configuration
# Base URL for the application
base.url=https://crm.example.com/login

# Browser Configuration
browser=chrome
headless.mode=false

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=15

# Salesforce Credentials
sf.username=your_username@salesforce.com
sf.password=your_password
sf.security.token=

# Report Configuration
report.path=test-output/
screenshot.on.failure=true

# Logging Configuration
log.level=INFO

# Database Configuration (optional)
db.host=localhost
db.port=3306
db.username=root
db.password=
db.name=crm_test
